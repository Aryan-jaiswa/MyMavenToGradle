plugins {
    id 'java'
    id 'maven-publish'
}

group = 'com.example1'
version = '1.0-SNAPSHOT'

description = "MyMavenToGradle"

java {
    sourceCompatibility = JavaVersion.VERSION_1_7
    targetCompatibility = JavaVersion.VERSION_1_7
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'junit:junit:3.8.1'
}

jar {
    manifest {
        attributes(
            'Main-Class': 'com.example.App'
        )
    }
}
